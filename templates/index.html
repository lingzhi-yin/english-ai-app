<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#315c48"><meta name="apple-mobile-web-app-capable" content="yes">
<title>随身英语</title><link rel="manifest" href="/static/manifest.json"><link rel="icon" href="/static/icon.svg"><link rel="stylesheet" href="/static/style.css">
</head><body><main class="app">
<header><span>POCKET ENGLISH</span><h1>今天，学一句真的会用的。</h1><p>拍下英文，理解它，然后开口。</p></header>
<section class="card capture"><label class="camera" for="camera">📷 拍照识别</label><input id="camera" type="file" accept="image/*" capture="environment" hidden><img id="preview" hidden><p id="ocrStatus" class="muted">支持课本、菜单、路牌等清晰英文</p></section>
<section class="card"><label for="sentence">英文句子</label><textarea id="sentence" rows="4" placeholder="拍照识别，或在这里输入英文…"></textarea><button id="learn" class="primary">开始学习</button></section>
<section id="analysis" class="card" hidden><div class="row"><h2>句子解析</h2><button id="speak" class="icon">🔊</button></div><small>翻译</small><p id="translation"></p><small>使用场景</small><p id="scene"></p><small>换种说法</small><ul id="alternatives"></ul><small>表达提示</small><p id="tips"></p><button id="score" class="secondary">🎙️ 跟读评分</button><p id="speechStatus" class="muted"></p><div id="scoreResult" class="scorebox" hidden></div></section>
<section class="card"><div class="row"><h2>今日学习</h2><button id="refresh" class="text">刷新</button></div><div id="records" class="muted">暂无记录</div></section>
</main><div id="toast"></div><script>
const $=id=>document.getElementById(id);let vc={language:'en-US',rate:.9,pitch:1};
function toast(s){$('toast').textContent=s;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),2600)}
async function api(url,opt={}){const r=await fetch(url,opt),d=await r.json();if(!r.ok)throw Error(d.error||'请求失败');return d}
function busy(b,on,s){b.disabled=on;if(on){b.dataset.old=b.textContent;b.textContent=s}else b.textContent=b.dataset.old}
$('camera').onchange=async e=>{const f=e.target.files[0];if(!f)return;$('preview').src=URL.createObjectURL(f);$('preview').hidden=false;$('ocrStatus').textContent='正在识别…';const form=new FormData();form.append('image',f);try{const d=await api('/api/ocr',{method:'POST',body:form});$('sentence').value=d.text;$('ocrStatus').textContent='识别完成，请校对后开始学习'}catch(x){$('ocrStatus').textContent=x.message;toast(x.message)}};
$('learn').onclick=async()=>{const sentence=$('sentence').value.trim();if(!sentence)return toast('请先拍照或输入英文');busy($('learn'),1,'正在分析…');try{const d=await api('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sentence})});$('translation').textContent=d.translation;$('scene').textContent=d.scene;$('tips').textContent=d.tips;$('alternatives').innerHTML='';(d.alternatives||[]).forEach(x=>{let li=document.createElement('li');li.textContent=x;$('alternatives').appendChild(li)});$('analysis').hidden=false;$('analysis').scrollIntoView({behavior:'smooth'});loadRecords()}catch(x){toast(x.message)}finally{busy($('learn'),0)}};
$('speak').onclick=()=>{if(!speechSynthesis)return toast('浏览器不支持朗读');speechSynthesis.cancel();const u=new SpeechSynthesisUtterance($('sentence').value);u.lang=vc.language;u.rate=vc.rate;u.pitch=vc.pitch;const vs=speechSynthesis.getVoices();u.voice=vs.find(v=>v.lang==='en-US')||vs.find(v=>v.lang.startsWith('en'))||null;speechSynthesis.speak(u)};
$('score').onclick=()=>{const R=window.SpeechRecognition||window.webkitSpeechRecognition;if(!R)return toast('请使用Chrome进行跟读识别');const r=new R();r.lang='en-US';r.interimResults=false;$('speechStatus').textContent='正在听，请朗读…';busy($('score'),1,'聆听中…');r.start();r.onresult=async e=>{const spoken=e.results[0][0].transcript;$('speechStatus').textContent='识别：'+spoken;try{const d=await api('/api/score',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({target:$('sentence').value,spoken})});$('scoreResult').hidden=false;$('scoreResult').innerHTML='<strong>'+d.score+' 分</strong><span>'+d.feedback+'</span>'+(d.missing.length?'<small>可留意：'+d.missing.join('、')+'</small>':'');loadRecords()}catch(x){toast(x.message)}};r.onerror=e=>$('speechStatus').textContent=e.error==='not-allowed'?'请允许麦克风权限':'没有听清，请重试';r.onend=()=>busy($('score'),0)};
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
async function loadRecords(){try{const a=await api('/api/records');$('records').innerHTML=a.length?a.slice(-8).reverse().map(r=>'<div class="record"><time>'+new Date(r.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+'</time><span>'+esc(r.sentence||'')+'</span>'+(r.pronunciation?'<b>'+r.pronunciation.score+'分</b>':'')+'</div>').join(''):'暂无记录'}catch(e){}}
$('refresh').onclick=loadRecords;fetch('/api/voice-config').then(r=>r.json()).then(x=>vc=x);loadRecords();if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('/sw.js'));
</script></body></html>
